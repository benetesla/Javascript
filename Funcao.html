	<script type="text/javascript">
		function calcularAreaTerreno (largura, comprimento){
			//Logica
			var area = largura * comprimento
			
			return area
		}
		var largura = prompt('Digite a largura do terreno em metros')
		var comprimento = prompt('Digite a largura do terreno em metros')

		var area = calcularAreaTerreno(largura, comprimento)

		document.write('O terreno possui ' + area + ' metros quadrados')


		//funcao soma
		function soma (a, b) {
			//b = b === undefined  ? 0 : b 
			return a + b  
		}
		console.log (soma( 8 , 8))
		console.log (soma( 7, 8, 78, 15))//desconsidera os parametros adicionais
		console.log(soma(7))//sera um valor indefinido um not a number
		onsole.log(soma())

	</script>
